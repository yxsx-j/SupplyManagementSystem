<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>货源管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF',
                        success: '#00B42A',
                        warning: '#FF7D00',
                        danger: '#F53F3F',
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .tab-active {
                @apply border-primary text-primary border-b-2 font-medium;
            }
            .btn-primary {
                @apply bg-primary text-white px-4 py-2 rounded-lg hover:bg-primary/90 transition-all duration-200;
            }
            .btn-success {
                @apply bg-success text-white px-4 py-2 rounded-lg hover:bg-success/90 transition-all duration-200;
            }
            .btn-warning {
                @apply bg-warning text-white px-4 py-2 rounded-lg hover:bg-warning/90 transition-all duration-200;
            }
            .btn-danger {
                @apply bg-danger text-white px-4 py-2 rounded-lg hover:bg-danger/90 transition-all duration-200;
            }
            .input-field {
                @apply w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all;
            }
            .card {
                @apply bg-white rounded-xl shadow-sm border border-gray-100 p-6;
            }
            .badge-pending {
                @apply bg-yellow-100 text-yellow-800 px-2 py-1 rounded-full text-xs font-medium;
            }
            .badge-success {
                @apply bg-green-100 text-green-800 px-2 py-1 rounded-full text-xs font-medium;
            }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- 顶部导航 -->
    <nav class="bg-white shadow-sm border-b border-gray-100 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 bg-primary rounded-lg flex items-center justify-center">
                        <i class="fa fa-truck text-white text-lg"></i>
                    </div>
                    <h1 class="text-xl font-bold text-gray-800">货源管理系统</h1>
                </div>
                <div class="flex items-center space-x-4 text-sm text-gray-600">
                    <span id="currentTime"></span>
                </div>
            </div>
        </div>
    </nav>

    <!-- 统计卡片 -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <div class="card">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">待报价货源</p>
                        <p class="text-3xl font-bold text-warning mt-1" id="pendingCount">0</p>
                    </div>
                    <div class="w-12 h-12 bg-yellow-100 rounded-full flex items-center justify-center">
                        <i class="fa fa-clock-o text-warning text-xl"></i>
                    </div>
                </div>
            </div>
            <div class="card">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">交易成功</p>
                        <p class="text-3xl font-bold text-success mt-1" id="successCount">0</p>
                    </div>
                    <div class="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center">
                        <i class="fa fa-check-circle text-success text-xl"></i>
                    </div>
                </div>
            </div>
            <div class="card">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">成交总额</p>
                        <p class="text-3xl font-bold text-primary mt-1">¥<span id="totalAmount">0</span></p>
                    </div>
                    <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center">
                        <i class="fa fa-rmb text-primary text-xl"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- 标签页 -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100">
            <div class="border-b border-gray-100">
                <div class="flex">
                    <button class="tab-btn tab-active px-6 py-4 text-sm" data-tab="publish">
                        <i class="fa fa-plus-circle mr-2"></i>发布货源
                    </button>
                    <button class="tab-btn px-6 py-4 text-sm text-gray-500 hover:text-gray-700" data-tab="pending">
                        <i class="fa fa-list mr-2"></i>待报价
                        <span class="ml-1 bg-yellow-100 text-yellow-800 px-2 py-0.5 rounded-full text-xs" id="pendingBadge">0</span>
                    </button>
                    <button class="tab-btn px-6 py-4 text-sm text-gray-500 hover:text-gray-700" data-tab="success">
                        <i class="fa fa-check mr-2"></i>交易成功
                    </button>
                </div>
            </div>

            <!-- 发布货源表单 -->
            <div id="tab-publish" class="tab-content p-6">
                <form id="freightForm" class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">日期</label>
                            <input type="date" name="date" id="formDate" class="input-field">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">发货地 <span class="text-danger">*</span></label>
                            <input type="text" name="origin" id="formOrigin" class="input-field" placeholder="请输入发货地" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">卸货地 <span class="text-danger">*</span></label>
                            <input type="text" name="destination" id="formDestination" class="input-field" placeholder="请输入卸货地" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">吨位 <span class="text-danger">*</span></label>
                            <input type="number" name="tonnage" id="formTonnage" class="input-field" placeholder="请输入吨位" step="0.01" min="0" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">需用车型 <span class="text-danger">*</span></label>
                            <input type="text" name="vehicle_type" id="formVehicle" class="input-field" placeholder="如: 13米高栏" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">单价(元/吨) <span class="text-danger">*</span></label>
                            <input type="number" name="price" id="formPrice" class="input-field" placeholder="请输入单价" step="0.01" min="0" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">是否含税</label>
                            <select name="tax_included" id="formTax" class="input-field">
                                <option value="false">不含税</option>
                                <option value="true">含税</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">结算方式 <span class="text-danger">*</span></label>
                            <input type="text" name="payment_method" id="formPayment" class="input-field" placeholder="如: 现结/周结/月结" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">下单人 <span class="text-danger">*</span></label>
                            <input type="text" name="order_person" id="formOrderPerson" class="input-field" placeholder="请输入下单人" required>
                        </div>
                    </div>
                    
                    <div class="bg-gray-50 rounded-lg p-4">
                        <div class="flex items-center justify-between">
                            <span class="text-gray-600">自动计算总价:</span>
                            <span class="text-2xl font-bold text-primary">¥<span id="calculatedTotal">0.00</span></span>
                        </div>
                    </div>

                    <div class="flex justify-end space-x-3">
                        <button type="button" onclick="resetForm()" class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 transition-all">
                            <i class="fa fa-refresh mr-2"></i>重置
                        </button>
                        <button type="submit" class="btn-primary">
                            <i class="fa fa-paper-plane mr-2"></i>发布货源
                        </button>
                    </div>
                </form>
            </div>

            <!-- 待报价列表 -->
            <div id="tab-pending" class="tab-content p-6 hidden">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-4 space-y-2 md:space-y-0">
                    <h3 class="text-lg font-semibold text-gray-800">待报价货源列表</h3>
                    <div class="flex items-center space-x-2">
                        <input type="text" id="searchPending" class="input-field w-64" placeholder="搜索发货地/卸货地/下单人...">
                        <button onclick="loadPendingFreights()" class="btn-primary">
                            <i class="fa fa-search"></i>
                        </button>
                    </div>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead>
                            <tr class="bg-gray-50">
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">ID</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">日期</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">发货地</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">卸货地</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">吨位</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">车型</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">总价</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">下单人</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">操作</th>
                            </tr>
                        </thead>
                        <tbody id="pendingTableBody" class="divide-y divide-gray-100">
                        </tbody>
                    </table>
                </div>
                <div id="pendingEmpty" class="hidden text-center py-12 text-gray-500">
                    <i class="fa fa-inbox text-4xl mb-3 text-gray-300"></i>
                    <p>暂无待报价货源</p>
                </div>
            </div>

            <!-- 交易成功列表 -->
            <div id="tab-success" class="tab-content p-6 hidden">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-4 space-y-2 md:space-y-0">
                    <h3 class="text-lg font-semibold text-gray-800">交易成功货源列表</h3>
                    <div class="flex items-center space-x-2">
                        <input type="text" id="searchSuccess" class="input-field w-64" placeholder="搜索发货地/卸货地/下单人...">
                        <button onclick="loadSuccessFreights()" class="btn-primary">
                            <i class="fa fa-search"></i>
                        </button>
                        <button onclick="exportToExcel()" class="btn-success">
                            <i class="fa fa-file-excel-o mr-1"></i>Excel
                        </button>
                    </div>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead>
                            <tr class="bg-gray-50">
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">ID</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">日期</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">发货地</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">卸货地</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">吨位</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">车型</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">总价</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">下单人</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">完成时间</th>
                            </tr>
                        </thead>
                        <tbody id="successTableBody" class="divide-y divide-gray-100">
                        </tbody>
                    </table>
                </div>
                <div id="successEmpty" class="hidden text-center py-12 text-gray-500">
                    <i class="fa fa-inbox text-4xl mb-3 text-gray-300"></i>
                    <p>暂无交易成功记录</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 详情弹窗 -->
    <div id="detailModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-xl shadow-xl max-w-lg w-full mx-4 transform transition-all">
            <div class="flex justify-between items-center p-6 border-b">
                <h3 class="text-lg font-semibold">货源详情</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600">
                    <i class="fa fa-times text-xl"></i>
                </button>
            </div>
            <div class="p-6" id="modalContent">
            </div>
            <div class="flex justify-end space-x-3 p-6 border-t bg-gray-50 rounded-b-xl">
                <button onclick="closeModal()" class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-100">
                    关闭
                </button>
                <button id="modalAcceptBtn" onclick="acceptFreight()" class="btn-success">
                    <i class="fa fa-check mr-2"></i>同意报价
                </button>
                <button id="modalEditBtn" onclick="editFreight()" class="btn-warning">
                    <i class="fa fa-pencil mr-2"></i>拒绝并修改
                </button>
            </div>
        </div>
    </div>

    <!-- Toast 提示 -->
    <div id="toast" class="fixed top-20 right-4 z-50 transform translate-x-full transition-transform duration-300">
        <div class="bg-white rounded-lg shadow-lg border px-4 py-3 flex items-center space-x-3">
            <i id="toastIcon" class="fa fa-check-circle text-success text-lg"></i>
            <span id="toastMessage" class="text-gray-700">操作成功</span>
        </div>
    </div>

    <script>
        // 全局变量
        let currentFreightId = null;
        let editMode = false;

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 设置默认日期为今天
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('formDate').value = today;

            // 更新时间
            updateTime();
            setInterval(updateTime, 1000);

            // 绑定事件
            bindEvents();

            // 加载数据
            loadStats();
            loadPendingFreights();
            loadSuccessFreights();
        });

        // 更新时间
        function updateTime() {
            const now = new Date();
            document.getElementById('currentTime').textContent = now.toLocaleString('zh-CN');
        }

        // 绑定事件
        function bindEvents() {
            // 标签页切换
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const tab = this.dataset.tab;
                    switchTab(tab);
                });
            });

            // 表单提交
            document.getElementById('freightForm').addEventListener('submit', function(e) {
                e.preventDefault();
                submitFreight();
            });

            // 实时计算总价
            document.getElementById('formTonnage').addEventListener('input', calculateTotal);
            document.getElementById('formPrice').addEventListener('input', calculateTotal);

            // 搜索
            document.getElementById('searchPending').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') loadPendingFreights();
            });
            document.getElementById('searchSuccess').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') loadSuccessFreights();
            });
        }

        // 切换标签页
        function switchTab(tab) {
            // 更新按钮状态
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('tab-active', 'text-primary');
                btn.classList.add('text-gray-500');
            });
            document.querySelector(`[data-tab="${tab}"]`).classList.add('tab-active');
            document.querySelector(`[data-tab="${tab}"]`).classList.remove('text-gray-500');

            // 显示对应内容
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.add('hidden');
            });
            document.getElementById(`tab-${tab}`).classList.remove('hidden');
        }

        // 计算总价
        function calculateTotal() {
            const tonnage = parseFloat(document.getElementById('formTonnage').value) || 0;
            const price = parseFloat(document.getElementById('formPrice').value) || 0;
            const total = (tonnage * price).toFixed(2);
            document.getElementById('calculatedTotal').textContent = total;
        }

        // 加载统计数据
        async function loadStats() {
            try {
                const res = await fetch('/api/stats');
                const data = await res.json();
                if (data.code === 0) {
                    document.getElementById('pendingCount').textContent = data.data.pending_count;
                    document.getElementById('pendingBadge').textContent = data.data.pending_count;
                    document.getElementById('successCount').textContent = data.data.success_count;
                    document.getElementById('totalAmount').textContent = data.data.total_amount.toLocaleString();
                }
            } catch (e) {
                console.error('加载统计失败', e);
            }
        }

        // 加载待报价货源
        async function loadPendingFreights() {
            const search = document.getElementById('searchPending').value;
            try {
                const res = await fetch(`/api/freights?status=pending&search=${encodeURIComponent(search)}`);
                const data = await res.json();
                if (data.code === 0) {
                    renderPendingTable(data.data);
                }
            } catch (e) {
                console.error('加载待报价失败', e);
            }
        }

        // 渲染待报价表格
        function renderPendingTable(freights) {
            const tbody = document.getElementById('pendingTableBody');
            const empty = document.getElementById('pendingEmpty');

            if (freights.length === 0) {
                tbody.innerHTML = '';
                empty.classList.remove('hidden');
                return;
            }

            empty.classList.add('hidden');
            tbody.innerHTML = freights.map(f => `
                <tr class="hover:bg-gray-50">
                    <td class="px-4 py-3 text-sm">${f.id}</td>
                    <td class="px-4 py-3 text-sm">${f.date}</td>
                    <td class="px-4 py-3 text-sm">${f.origin}</td>
                    <td class="px-4 py-3 text-sm">${f.destination}</td>
                    <td class="px-4 py-3 text-sm">${f.tonnage}吨</td>
                    <td class="px-4 py-3 text-sm">${f.vehicle_type}</td>
                    <td class="px-4 py-3 text-sm font-medium text-primary">¥${f.total}</td>
                    <td class="px-4 py-3 text-sm">${f.order_person}</td>
                    <td class="px-4 py-3 text-sm">
                        <button onclick="showDetail(${f.id})" class="text-primary hover:text-primary/80 mr-2" title="查看详情">
                            <i class="fa fa-eye"></i>
                        </button>
                        <button onclick="acceptFreightById(${f.id})" class="text-success hover:text-success/80 mr-2" title="同意报价">
                            <i class="fa fa-check"></i>
                        </button>
                        <button onclick="editFreightById(${f.id})" class="text-warning hover:text-warning/80" title="拒绝并修改">
                            <i class="fa fa-pencil"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        // 加载成功货源
        async function loadSuccessFreights() {
            const search = document.getElementById('searchSuccess').value;
            try {
                const res = await fetch(`/api/freights?status=success&search=${encodeURIComponent(search)}`);
                const data = await res.json();
                if (data.code === 0) {
                    renderSuccessTable(data.data);
                }
            } catch (e) {
                console.error('加载成功列表失败', e);
            }
        }

        // 渲染成功表格
        function renderSuccessTable(freights) {
            const tbody = document.getElementById('successTableBody');
            const empty = document.getElementById('successEmpty');

            if (freights.length === 0) {
                tbody.innerHTML = '';
                empty.classList.remove('hidden');
                return;
            }

            empty.classList.add('hidden');
            tbody.innerHTML = freights.map(f => `
                <tr class="hover:bg-gray-50">
                    <td class="px-4 py-3 text-sm">${f.id}</td>
                    <td class="px-4 py-3 text-sm">${f.date}</td>
                    <td class="px-4 py-3 text-sm">${f.origin}</td>
                    <td class="px-4 py-3 text-sm">${f.destination}</td>
                    <td class="px-4 py-3 text-sm">${f.tonnage}吨</td>
                    <td class="px-4 py-3 text-sm">${f.vehicle_type}</td>
                    <td class="px-4 py-3 text-sm font-medium text-primary">¥${f.total}</td>
                    <td class="px-4 py-3 text-sm">${f.order_person}</td>
                    <td class="px-4 py-3 text-sm text-gray-500">${f.completed_at || '-'}</td>
                </tr>
            `).join('');
        }

        // 提交货源
        async function submitFreight() {
            const formData = {
                date: document.getElementById('formDate').value,
                origin: document.getElementById('formOrigin').value,
                destination: document.getElementById('formDestination').value,
                tonnage: parseFloat(document.getElementById('formTonnage').value),
                vehicle_type: document.getElementById('formVehicle').value,
                price: parseFloat(document.getElementById('formPrice').value),
                tax_included: document.getElementById('formTax').value === 'true',
                payment_method: document.getElementById('formPayment').value,
                order_person: document.getElementById('formOrderPerson').value
            };

            try {
                let url = '/api/freights';
                let method = 'POST';

                if (editMode && currentFreightId) {
                    url = `/api/freights/${currentFreightId}`;
                    method = 'PUT';
                }

                const res = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });
                const data = await res.json();

                if (data.code === 0) {
                    showToast(editMode ? '修改成功！' : '发布成功！', 'success');
                    resetForm();
                    loadStats();
                    loadPendingFreights();
                    switchTab('pending');
                } else {
                    showToast(data.message, 'error');
                }
            } catch (e) {
                showToast('操作失败', 'error');
            }
        }

        // 重置表单
        function resetForm() {
            document.getElementById('freightForm').reset();
            document.getElementById('formDate').value = new Date().toISOString().split('T')[0];
            document.getElementById('calculatedTotal').textContent = '0.00';
            currentFreightId = null;
            editMode = false;
        }

        // 显示详情
        async function showDetail(id) {
            currentFreightId = id;
            try {
                const res = await fetch(`/api/freights/${id}`);
                const data = await res.json();
                if (data.code === 0) {
                    const f = data.data;
                    document.getElementById('modalContent').innerHTML = `
                        <div class="space-y-4">
                            <div class="grid grid-cols-2 gap-4">
                                <div><span class="text-gray-500">ID:</span> ${f.id}</div>
                                <div><span class="text-gray-500">状态:</span> <span class="badge-pending">待报价</span></div>
                                <div><span class="text-gray-500">日期:</span> ${f.date}</div>
                                <div><span class="text-gray-500">创建时间:</span> ${f.created_at}</div>
                                <div><span class="text-gray-500">发货地:</span> ${f.origin}</div>
                                <div><span class="text-gray-500">卸货地:</span> ${f.destination}</div>
                                <div><span class="text-gray-500">吨位:</span> ${f.tonnage}吨</div>
                                <div><span class="text-gray-500">车型:</span> ${f.vehicle_type}</div>
                                <div><span class="text-gray-500">单价:</span> ¥${f.price}/吨</div>
                                <div><span class="text-gray-500">是否含税:</span> ${f.tax_included ? '是' : '否'}</div>
                                <div><span class="text-gray-500">结算方式:</span> ${f.payment_method}</div>
                                <div><span class="text-gray-500">下单人:</span> ${f.order_person}</div>
                            </div>
                            <div class="bg-blue-50 rounded-lg p-4 text-center">
                                <span class="text-gray-600">总价:</span>
                                <span class="text-2xl font-bold text-primary ml-2">¥${f.total}</span>
                            </div>
                        </div>
                    `;
                    document.getElementById('detailModal').classList.remove('hidden');
                }
            } catch (e) {
                showToast('加载详情失败', 'error');
            }
        }

        // 关闭弹窗
        function closeModal() {
            document.getElementById('detailModal').classList.add('hidden');
            currentFreightId = null;
        }

        // 同意报价
        async function acceptFreight() {
            if (!currentFreightId) return;
            await acceptFreightById(currentFreightId);
            closeModal();
        }

        async function acceptFreightById(id) {
            try {
                const res = await fetch(`/api/freights/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: 'success' })
                });
                const data = await res.json();
                if (data.code === 0) {
                    showToast('报价已同意，已移入交易成功列表', 'success');
                    loadStats();
                    loadPendingFreights();
                    loadSuccessFreights();
                } else {
                    showToast(data.message, 'error');
                }
            } catch (e) {
                showToast('操作失败', 'error');
            }
        }

        // 编辑货源
        async function editFreight() {
            if (!currentFreightId) return;
            await editFreightById(currentFreightId);
            closeModal();
        }

        async function editFreightById(id) {
            try {
                const res = await fetch(`/api/freights/${id}`);
                const data = await res.json();
                if (data.code === 0) {
                    const f = data.data;
                    document.getElementById('formDate').value = f.date;
                    document.getElementById('formOrigin').value = f.origin;
                    document.getElementById('formDestination').value = f.destination;
                    document.getElementById('formTonnage').value = f.tonnage;
                    document.getElementById('formVehicle').value = f.vehicle_type;
                    document.getElementById('formPrice').value = f.price;
                    document.getElementById('formTax').value = f.tax_included.toString();
                    document.getElementById('formPayment').value = f.payment_method;
                    document.getElementById('formOrderPerson').value = f.order_person;
                    calculateTotal();

                    currentFreightId = id;
                    editMode = true;
                    switchTab('publish');
                    showToast('数据已回填，请修改后重新发布', 'info');
                }
            } catch (e) {
                showToast('加载数据失败', 'error');
            }
        }

        // 导出Excel数据
        function exportToExcel() {
            window.open('/api/export/excel?status=success', '_blank');
            showToast('正在导出Excel文件...', 'success');
        }

        // 显示提示
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toastIcon');
            const msg = document.getElementById('toastMessage');

            msg.textContent = message;

            if (type === 'success') {
                icon.className = 'fa fa-check-circle text-success text-lg';
            } else if (type === 'error') {
                icon.className = 'fa fa-exclamation-circle text-danger text-lg';
            } else {
                icon.className = 'fa fa-info-circle text-primary text-lg';
            }

            toast.classList.remove('translate-x-full');
            setTimeout(() => {
                toast.classList.add('translate-x-full');
            }, 3000);
        }
    </script>
</body>
</html>
